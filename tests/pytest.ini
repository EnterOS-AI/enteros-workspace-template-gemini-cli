[pytest]
# Local pytest config for this template's test suite.
#
# Pytest's default rootdir auto-detection walks parent dirs looking
# for a project file (pyproject.toml / setup.py / pytest.ini). Without
# one in repo root, it ends up using the closest common ancestor and
# then tries to treat the repo-root ``__init__.py`` (which exists for
# molecule-runtime's package-style adapter registration —
# ``from .adapter import GeminiCLIAdapter as Adapter``) as a test
# parent, which 500s on the relative ``.adapter`` import.
#
# Pin rootdir to this directory so pytest never walks back into the
# repo's package-style ``__init__.py``.
asyncio_mode = strict
